<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="cloud-icon-d" x1="40" y1="2.5" x2="40" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4D7EA8"/>
      <stop offset="100%" stop-color="#1E4A6E"/>
    </linearGradient>
  </defs>

  <!-- ── STORM CLOUD ── -->
  <circle cx="31" cy="20" r="8.5"  fill="url(#cloud-icon-d)"/>
  <circle cx="40" cy="13" r="10.5" fill="url(#cloud-icon-d)"/>
  <circle cx="49" cy="20" r="8.5"  fill="url(#cloud-icon-d)"/>
  <rect   x="22.5" y="19.5" width="35" height="8.5" fill="url(#cloud-icon-d)"/>

  <!-- ── RAIN STREAKS (left of lightning) ── -->
  <line x1="23" y1="30" x2="23" y2="37" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.60"/>
  <line x1="27" y1="34" x2="27" y2="41" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="31" y1="31" x2="31" y2="38" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.60"/>

  <!-- ── RAIN STREAKS (right of lightning) ── -->
  <line x1="49" y1="31" x2="49" y2="38" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.60"/>
  <line x1="53" y1="34" x2="53" y2="41" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="57" y1="30" x2="57" y2="37" stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round" opacity="0.60"/>

  <!-- ── LIGHTNING BOLT ── -->
  <path d="M 40 28 L 37 36 L 41 36 L 38 43"
        stroke="#F7E040" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- ── DAG: node A ── -->
  <circle cx="40" cy="45" r="2.5" fill="#72BCE0"/>

  <!-- ── DAG: branch edges ── -->
  <line x1="40" y1="47.5" x2="32" y2="54"
        stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="47.5" x2="48" y2="54"
        stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── DAG: node B (left) ── -->
  <circle cx="32" cy="56" r="2.5" fill="#72BCE0"/>

  <!-- ── DAG: node C (right) ── -->
  <circle cx="48" cy="56" r="2.5" fill="#72BCE0"/>

  <!-- ── DAG: merge edges ── -->
  <line x1="32" y1="58.5" x2="40" y2="61.5"
        stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="58.5" x2="40" y2="61.5"
        stroke="#5AA8D0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── COMMIT NODE ── -->
  <circle cx="40" cy="68" r="6.5" fill="#E0E0E0"/>
</svg>
